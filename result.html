<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kết quả tra cứu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#07111f,#0b2038,#132c4f);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

}

.card{

width:700px;
max-width:100%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
border-radius:25px;
padding:35px;
color:white;
box-shadow:0 20px 60px rgba(0,0,0,.35);

}

h1{

text-align:center;
margin-bottom:8px;

}

.subtitle{

text-align:center;
color:#d4d4d4;
margin-bottom:30px;

}

.info{

display:grid;
grid-template-columns:1fr 1fr;
gap:18px;

}

.box{

background:rgba(255,255,255,.08);
padding:18px;
border-radius:15px;

}

.box h3{

margin-bottom:12px;
font-size:18px;

}

.line{

display:flex;
justify-content:space-between;
padding:7px 0;

}

.label{

color:#cfcfcf;

}

.value{

font-weight:600;

}

.status{

margin-top:15px;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;

}

.green{

background:#23a559;

}

.red{

background:#d93025;

}

.orange{

background:#d18d00;

}

.gray{

background:#555;

}

button{

margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2ba9ff;
color:white;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#4dbaff;

}

</style>

</head>

<body>

<div class="card">

<h1>🌪️ COWER ĐẠP GIÓ "SAY HI"</h1>

<div class="subtitle">

KẾT QUẢ THÍ SINH

</div>

<div id="result"></div>

<button onclick="location.href='index.html'">

Quay lại

</button>

</div>

<script src="database.js"></script>

<script>

const params=new URLSearchParams(location.search);

const code=params.get("code");

const user=database.find(x=>x.code===code);

const div=document.getElementById("result");

if(!user){

div.innerHTML="<h2 style='text-align:center'>❌ Không tìm thấy mã tra cứu.</h2>";

}else{

function color(status){

if(status=="Thăng cấp") return "green";

if(status=="Loại") return "red";

if(status=="Rút lui") return "orange";

return "gray";

}

div.innerHTML=`

<div class="box" style="margin-bottom:20px">

<div class="line">

<span class="label">Nghệ danh</span>

<span class="value">${user.name}</span>

</div>

<div class="line">

<span class="label">Mã tra cứu</span>

<span class="value">${user.code}</span>

</div>

</div>

<div class="info">

<div class="box">

<h3>🌱 Vòng bắt đầu</h3>

<div class="line"><span class="label">Điểm</span><span>${user.round1}</span></div>

<div class="line"><span class="label">Xếp hạng</span><span>#${user.rank1}</span></div>

</div>

<div class="box">

<h3>🏆 Công 1</h3>

<div class="line"><span class="label">Điểm cá nhân</span><span>${user.score1}</span></div>

<div class="line"><span class="label">Thứ hạng</span><span>#${user.rankCong1}</span></div>

<div class="status ${color(user.cong1)}">${user.cong1}</div>

</div>

<div class="box">

<h3>⚡ Công 2</h3>

<div class="line"><span class="label">Điểm cá nhân</span><span>${user.score2??"-"}</span></div>

<div class="line"><span class="label">Thứ hạng</span><span>${user.rankCong2?("#"+user.rankCong2):"-"}</span></div>

<div class="status ${color(user.cong2)}">${user.cong2??"Chưa diễn ra"}</div>

</div>

</div>

`;

}

</script>

</body>

</html>
