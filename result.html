<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kết quả tra cứu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#081320,#0b1f36,#09111f);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

color:white;

}

.card{

width:450px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

padding:35px;

border-radius:22px;

box-shadow:0 10px 40px rgba(0,0,0,.4);

}

h1{

text-align:center;

margin-bottom:25px;

}

.item{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px solid rgba(255,255,255,.15);

}

.label{

color:#bfc7d5;

}

.value{

font-weight:600;

}

.success{

margin-top:20px;

padding:14px;

background:#0f8b4c;

border-radius:12px;

text-align:center;

font-weight:bold;

}

.error{

margin-top:20px;

padding:14px;

background:#c62828;

border-radius:12px;

text-align:center;

font-weight:bold;

}

button{

margin-top:25px;

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:#28b7ff;

color:white;

font-size:15px;

cursor:pointer;

}

button:hover{

background:#4cc8ff;

}

</style>

</head>

<body>

<div class="card">

<h1>🌪️ KẾT QUẢ TRA CỨU</h1>

<div id="content"></div>

<button onclick="location.href='index.html'">

Quay lại

</button>

</div>

<script src="database.js"></script>

<script>

const params=new URLSearchParams(window.location.search);

const code=params.get("code");

const result=database.find(item=>item.code===code);

const content=document.getElementById("content");

if(result){

content.innerHTML=`

<div class="item">
<span class="label">Mã tra cứu</span>
<span class="value">${result.code}</span>
</div>

<div class="item">
<span class="label">Nghệ danh</span>
<span class="value">${result.name}</span>
</div>

<div class="item">
<span class="label">SBD</span>
<span class="value">${result.sbd}</span>
</div>

<div class="item">
<span class="label">Đội</span>
<span class="value">${result.team}</span>
</div>

<div class="item">
<span class="label">Đội trưởng</span>
<span class="value">${result.captain}</span>
</div>

<div class="item">
<span class="label">Điểm</span>
<span class="value">${result.score}</span>
</div>

<div class="item">
<span class="label">Xếp hạng</span>
<span class="value">${result.rank}</span>
</div>

<div class="success">
🟢 ${result.status}
</div>

`;

}else{

content.innerHTML=`

<div class="error">

❌ Không tìm thấy mã tra cứu.

</div>

`;

}

</script>

</body>

</html>
