<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COWER ĐẠP GIÓ "SAY HI" | Tra cứu kết quả</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:linear-gradient(135deg,#081320,#10263e,#09111f);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

}

body::before{

    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00c2ff22;
    border-radius:50%;
    top:-180px;
    left:-150px;
    filter:blur(90px);

}

body::after{

    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#8a5cff22;
    border-radius:50%;
    bottom:-180px;
    right:-150px;
    filter:blur(90px);

}

.card{

    width:430px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:24px;
    padding:40px;
    color:white;
    box-shadow:0 15px 45px rgba(0,0,0,.3);

}

.logo{

    font-size:55px;
    text-align:center;

}

h1{

    text-align:center;
    font-size:28px;
    margin-top:12px;

}

.subtitle{

    text-align:center;
    color:#d8d8d8;
    margin-top:8px;
    margin-bottom:35px;
    font-size:14px;
    line-height:1.6;

}

label{

    display:block;
    margin-bottom:8px;
    font-weight:500;

}

select,
input{

    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    margin-bottom:20px;
    background:rgba(255,255,255,.12);
    color:white;
    outline:none;
    font-size:15px;

}

select option{

    color:black;

}

input::placeholder{

    color:#cccccc;

}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#28b7ff;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;

}

button:hover{

    background:#4dc7ff;
    transform:translateY(-2px);

}

.footer{

    margin-top:25px;
    text-align:center;
    color:#cfcfcf;
    font-size:13px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">🌪️</div>

<h1>COWER ĐẠP GIÓ "SAY HI"</h1>

<p class="subtitle">
Chào mừng bạn đến với hệ thống tra cứu kết quả chính thức.<br>
Vui lòng chọn mùa giải và nhập mã tra cứu.
</p>

<label>Mùa giải</label>

<select id="year">

<option value="2026">2026</option>

</select>

<label>Mã tra cứu</label>

<input
type="text"
id="code"
placeholder="Ví dụ: DG2026-004">

<button onclick="searchResult()">

TRA CỨU

</button>

<div class="footer">

© 2026 COWER ĐẠP GIÓ "SAY HI"

</div>

</div>

<script>

function searchResult(){

    const year=document.getElementById("year").value;
    const code=document.getElementById("code").value.trim();

    if(code==""){

        alert("Vui lòng nhập mã tra cứu.");
        return;

    }

    // Sau này chỉ cần sửa dòng này
    window.location.href=
    "result.html?year="+year+"&code="+encodeURIComponent(code);

}

</script>

</body>
</html>
